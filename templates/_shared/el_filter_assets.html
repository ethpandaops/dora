{{ define "elFilterCss" }}
<link rel="stylesheet" href="/css/bootstrap-multiselect.css">
<style>
  .filter-multiselect-container {
    width: 100%;
  }
  .filter-multiselect-container.btn-group>.btn {
    text-align: left;
  }
  .filter-multiselect-container .multiselect-container {
    width: 100%;
  }
  .filter-multiselect-container .multiselect-container>li>a>label {
    padding: 4px 8px;
    width: 100%;
    white-space: nowrap;
  }
  .filter-multiselect-container .multiselect-container>li>a>label>input {
    margin: 0 4px;
  }
  .filter-separator {
    width: 20px;
    text-align: center;
  }
</style>
{{ end }}

{{ define "elFilterJs" }}
<script src="/js/bootstrap-multiselect.js"></script>
<script type="text/javascript">
function decorateFilterMultiselect() {
  this.$button.attr("data-bs-toggle", "dropdown");
  this.$container.addClass("filter-multiselect-container");
}

// initElFilters inits the multiselects within root (default document). Safe to
// call repeatedly (e.g. after AJAX-loading a tab) — already-inited selects are
// skipped.
function initElFilters(root) {
  root = root || document;
  $(root).find('.el-filter-form .filter-multiselect').each(function() {
    if ($(this).data('ms-init')) { return; }
    $(this).data('ms-init', true);
    var opts = { onInitialized: decorateFilterMultiselect };
    if ($(this).hasClass('column-multiselect')) {
      // Column selector: auto-apply when the dropdown closes after a change.
      var form = $(this).closest('form');
      var changed = false;
      opts.nonSelectedText = 'Columns';
      opts.onChange = function() { changed = true; };
      opts.onDropdownHidden = function() { if (changed) { changed = false; $(form).trigger('submit'); } };
    }
    $(this).multiselect(opts);
  });
}
window.initElFilters = initElFilters;

// cleanElFilter drops empty inputs and encodes every bitmask multiselect into
// its hidden companion input before the form is serialized/submitted.
function cleanElFilter(form) {
  $(form).find('input[type="text"],input[type="number"],select:not([multiple])').filter(function() {
    return !this.value;
  }).prop('name', '');
  $(form).find('select.bitmask-multiselect').each(function() {
    var name = this.getAttribute('data-mask-name');
    var base = parseInt(this.getAttribute('data-mask-base') || '0');
    var mask = 0;
    $(this).find('option:selected').each(function() { mask |= 1 << (parseInt(this.value) - base); });
    $(this).prop('name', '');
    var hidden = $(form).find('input[data-mask-for="' + name + '"]');
    if (mask) { hidden.prop('name', name).val('0x' + mask.toString(16)); } else { hidden.prop('name', ''); }
  });
}

$(function() {
  initElFilters(document);
  // Delegated so AJAX-injected forms (address tabs) are handled too.
  $(document).on('submit', '.el-filter-form', function(e) {
    cleanElFilter(this);
    if (this.getAttribute('data-ajax-target') && window.elFilterAjaxSubmit) {
      e.preventDefault();
      window.elFilterAjaxSubmit(this);
    }
  });
});
</script>
{{ end }}
